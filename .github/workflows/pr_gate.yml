name: pr_gate

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]
  workflow_dispatch:

jobs:
  gate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Préparer le contexte PR
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          printf '%s' "$PR_BODY" > pr_body.txt
          git fetch origin "$BASE_SHA" --depth=1
          git fetch origin "$HEAD_SHA" --depth=1
          git diff --name-only "$BASE_SHA" "$HEAD_SHA" > changed_files.txt

      - name: Valider le corps de PR
        env:
          HEAD_REF: ${{ github.head_ref }}
        run: |
          python scripts/validate_pr_body.py \
            --body-file pr_body.txt \
            --policy project/project_policy.yaml \
            --registry project/todo_registry.yaml \
            --changed-files-file changed_files.txt \
            --head-ref "$HEAD_REF"

      - name: make validate
        run: make validate

      - name: make test
        run: make test
