name: Release foundation ZIP

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build-zip:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build foundation ZIP
        run: python scripts/build_foundation_zip.py

      - name: Upload ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: foundation-zip
          path: "*.zip"
          retention-days: 30
