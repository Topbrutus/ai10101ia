name: Sync checklist

on:
  push:
    branches: ["main"]
    paths:
      - "project/todo_registry.yaml"

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check sync
        run: python scripts/sync_checklist.py --mode check
